<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaahModijiWaah</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-ZY1JZV1M7S');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400&family=Noto+Serif:wght@700&family=EB+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FC6A03;
            --deep-green: #278D27;
            --accent-brown: #A52A2A;
            --text-dark: #333333;
            --border-thickness: 50px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Serif Display', display serif;
            overflow-x: hidden;
            background: var(--primary-orange);
        }

        .page-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 100;
            border: var(--border-thickness) solid transparent;
            border-image-source: url('border.jpg');
            border-image-slice: 100;
            border-image-repeat: round;
            mix-blend-mode: multiply;
        }

        /* --- SECTION 1 --- */
        .section-one {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 30vh;
            overflow: hidden;
        }

        .parallax-bg {
            position: absolute;
            top: -30%; left: 0;
            width: 100%; height: 160%;
            background-color: var(--primary-orange);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(39,141,39,0.12) 0%, transparent 50%);
            will-change: transform;
            z-index: 0;
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 900px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .hindi-text {
            font-family: 'Rozha One', Display-serif;
            font-size: 25px;
            color: var(--text-dark);
            margin-bottom: 5px;
            display: inline-block;
            border-bottom: 1px solid rgba(0,0,0,0.5);
        }

        .main-headline {
            color: var(--deep-green);
            font-size: clamp(34px, 7vw, 64px);
            font-weight: 700;
            margin: 20px 0;
            line-height: 1.15;
        }

        .crossed-out { color: var(--accent-brown); text-decoration: line-through; }

        .sub-text {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-weight: 600;
            font-size: clamp(18px, 3.5vw, 24px);
            color: var(--text-dark);
            margin: 30px 0;
        }

        .email-link { color: var(--deep-green); text-decoration: none; }
        .email-link:hover { text-decoration: underline; }

        /* --- SCROLL INDICATOR --- */
        .scroll-indicator {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        .scroll-indicator span {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 14px;
            color: var(--text-dark);
        }

        .scroll-arrow {
            width: 20px; height: 20px;
            border-right: 2px solid var(--text-dark);
            border-bottom: 2px solid var(--text-dark);
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(8px); }
        }

        /* --- SVG WAVE TRANSITION --- */
        /*
         * The transition area sits on top of the orange section background.
         * The SVG has 7 wave layers sharing one <path> definition, animated
         * purely via CSS translateX — no JavaScript, no canvas.
         * Colours interpolate linearly from #FC6A03 (orange) to #278D27 (green)
         * across 7 steps: each layer is offset by y+2 so they stack vertically,
         * giving the illusion of depth as faster/slower layers scroll past each other.
         */
        .wave-transition {
            position: relative;
            background-color: var(--primary-orange); /* same as section-one */
            height: 220px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: -2px;
        }

        .waves {
            width: 100%;
            height: 180px;
            display: block;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }

        /* Each layer gets a distinct speed + delay = parallax depth illusion */
        .parallax > use:nth-child(1) { animation-delay: -2s;  animation-duration: 7s;  opacity: 0.30; }
        .parallax > use:nth-child(2) { animation-delay: -3s;  animation-duration: 10s; opacity: 0.50; }
        .parallax > use:nth-child(3) { animation-delay: -4s;  animation-duration: 13s; opacity: 0.45; }
        .parallax > use:nth-child(4) { animation-delay: -5s;  animation-duration: 16s; opacity: 0.60; }
        .parallax > use:nth-child(5) { animation-delay: -6s;  animation-duration: 19s; opacity: 0.75; }
        .parallax > use:nth-child(6) { animation-delay: -7s;  animation-duration: 22s; opacity: 0.88; }
        .parallax > use:nth-child(7) { animation-delay: -8s;  animation-duration: 25s; opacity: 1.00; }

        @keyframes move-forever {
            0%   { transform: translate3d(-90px, 0, 0); }
            100% { transform: translate3d(85px,  0, 0); }
        }

        /* --- SECTION 2 --- */
        .section-two {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: var(--deep-green);
            margin-top: -1px;
        }

        .section-two-bg {
            position: absolute;
            top: -30%; left: 0;
            width: 100%; height: 160%;
            background-image:
                radial-gradient(ellipse at 80% 50%, rgba(252,106,3,0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.04) 0%, transparent 50%);
            will-change: transform;
            z-index: 0;
        }

        .section-two-content {
            text-align: center;
            width: 85%;
            max-width: 900px;
            padding: 20px;
            z-index: 10;
            position: relative;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .section-two-content.visible { opacity: 1; transform: translateY(0); }

        .edu-label {
            font-family: 'Rozha One', display-serif;
            font-size: 20px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            display: inline-block;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            padding-bottom: 5px;
        }

        .edu-headline {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: clamp(28px, 6vw, 72px);
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 40px;
        }

        .edu-headline em { color: var(--primary-orange); font-style: italic; }

        .edu-sub {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-weight: 600;
            font-size: clamp(16px, 3vw, 22px);
            color: rgba(255,255,255,0.75);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .edu-sub a:hover { color: var(--primary-orange) !important; transition: color 0.3s ease; }

        @media (max-width: 600px) {
            :root { --border-thickness: 25px; }
            .main-headline   { font-size: 36px; }
            .hindi-text      { font-size: 24px; }
            .edu-headline    { font-size: 32px; }
            .wave-transition { height: 160px; }
            .waves           { height: 130px; }
        }
    </style>
</head>

<body>

    <div class="page-frame"></div>

    <!-- SECTION 1 -->
    <section class="section-one">
        <div class="parallax-bg" id="parallax-bg-1"></div>

        <div class="container">
            <div class="hindi-text">भाइयों और बहनों</div>
            <div class="main-headline">
                Want to buy<br>
                this <span class="crossed-out">nation</span> domain?
            </div>
            <div class="sub-text">
                Yes, this could be yours.<br>The domain, not the nation.
            </div>
        </div>

        <div class="scroll-indicator">
            <span>scroll</span>
            <div class="scroll-arrow"></div>
        </div>
    </section>

    <!--
        SVG WAVE TRANSITION
        ───────────────────
        One reusable <path id="gentle-wave"> drawn 7 times via <use>,
        each shifted down by y+2 units and filled with a colour stop
        interpolated from orange (#FC6A03) to green (#278D27).
        Animation is pure CSS translateX at different speeds → parallax depth.
        No canvas, no requestAnimationFrame.
    -->
    <div class="wave-transition">
        <svg class="waves"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 24 150 28"
             preserveAspectRatio="none"
             shape-rendering="auto">
            <defs>
                <path id="gentle-wave"
                      d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <!-- 7 colour stops: orange → green, y offset increases by 2 each step -->
                <use href="#gentle-wave" x="48" y="0"  fill="#CE720B" />
                <use href="#gentle-wave" x="48" y="2"  fill="#B07610" />
                <use href="#gentle-wave" x="48" y="4"  fill="#927C15" />
                <use href="#gentle-wave" x="48" y="6"  fill="#73801A" />
                <use href="#gentle-wave" x="48" y="8"  fill="#55861F" />
                <use href="#gentle-wave" x="48" y="10" fill="#368A24" />
                <use href="#gentle-wave" x="48" y="12" fill="#278D27" />
            </g>
        </svg>
    </div>

    <!-- SECTION 2 -->
    <section class="section-two">
        <div class="section-two-bg" id="parallax-bg-2"></div>

        <div class="section-two-content" id="section-two-content">
            <br><br><br><br><br><br><br>
            <div class="edu-label">एक कारण और भी है</div>
            <div class="edu-headline">
                Something's coming up<br><em>soon!</em>
            </div>
            <div class="edu-sub">
                <br><br><br><br>
                Meanwhile, you can buy this domain and fund my education!
            </div>
            <div class="edu-sub" style="margin-top: 0;">
                Email to: <a href="mailto:contact@waahmodijiwaah.com"
                             style="color: rgba(255,255,255,0.75); text-decoration: none;">
                    contact@waahmodijiwaah.com
                </a>
            </div>
        </div>
    </section>

    <script>
        // --- Parallax backgrounds ---
        const bg1 = document.getElementById('parallax-bg-1');
        const bg2 = document.getElementById('parallax-bg-2');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            bg1.style.transform = `translateY(${scrollY * 0.4}px)`;
            bg2.style.transform = `translateY(${scrollY * 0.2}px)`;
        }, { passive: true });

        // --- Fade-in section 2 on scroll into view ---
        const content  = document.getElementById('section-two-content');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) content.classList.add('visible');
            });
        }, { threshold: 0.2 });
        observer.observe(content);
    </script>

</body>
</html>
